<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kakao Map Minimal Test</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f7f8fa;
        color: #111827;
      }
      .wrap {
        max-width: 900px;
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 20px;
      }
      #map {
        width: 100%;
        height: 420px;
        border-radius: 12px;
        background: #eef2f7;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
        line-height: 1.5;
      }
      .ok { color: #047857; }
      .fail { color: #b91c1c; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1 style="margin:0 0 8px">Kakao Map Minimal Test</h1>
        <p style="margin:0">앱 코드와 분리된 순수 SDK 테스트 페이지입니다.</p>
      </div>
      <div class="card">
        <div id="map"></div>
      </div>
      <div class="card">
        <pre id="log">loading...</pre>
      </div>
    </div>

    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=b912305361ab3ad47fd00c2714bf324e&autoload=false&libraries=services"></script>
    <script src="/kakao-map-test.js"></script>
  </body>
</html>
